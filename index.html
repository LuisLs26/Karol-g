<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para Karol</title>
    <style>
        /* Importamos una fuente bonita para el cartel */
        @import url('https://fonts.googleapis.com/css2?family=Pacifico&display=swap');

        body {
            margin: 0;
            padding: 0;
            background-color: #0a0a0a; /* Fondo muy oscuro para el efecto neón */
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            font-family: 'Pacifico', cursive;
        }

        .scene {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .face-container {
            position: relative;
        }

        /* Estilo y animación de la carita feliz neón */
        .face {
            font-size: 120px;
            /* Efecto de brillo neón turquesa */
            filter: drop-shadow(0 0 15px #00ffcc) drop-shadow(0 0 30px #00ffcc);
            animation: float 3s ease-in-out infinite;
            z-index: 2;
        }

        /* Estilo y animación de la rosa */
        .rose {
            font-size: 80px;
            position: absolute;
            bottom: 10px;
            right: -20px;
            /* Efecto de brillo neón rojo/rosado */
            filter: drop-shadow(0 0 10px #ff0055) drop-shadow(0 0 20px #ff0055);
            transform-origin: bottom left;
            transform: rotate(-90deg) scale(0);
            opacity: 0;
            /* La rosa aparece después de 1.5 segundos */
            animation: revealRose 2s ease-out 1.5s forwards;
            z-index: 1;
        }

        /* Estilo y animación del cartel */
        .sign {
            margin-top: 40px;
            font-size: 42px;
            color: #fff;
            text-align: center;
            /* Brillo neón fucsia para el texto */
            text-shadow:
                0 0 5px #fff,
                0 0 10px #fff,
                0 0 20px #ff00ff,
                0 0 40px #ff00ff,
                0 0 80px #ff00ff;
            opacity: 0;
            transform: translateY(20px);
            /* El texto aparece después de 3.5 segundos */
            animation: showSign 2s ease-out 3.5s forwards;
            line-height: 1.3;
        }

        /* --- KEYFRAMES (Animaciones) --- */

        /* Hace que la carita flote arriba y abajo */
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }

        /* Hace que la rosa salga como si la estuviera ofreciendo */
        @keyframes revealRose {
            0% { transform: rotate(-90deg) scale(0); opacity: 0; }
            50% { opacity: 1; }
            100% { transform: rotate(15deg) scale(1) translateX(40px); opacity: 1; }
        }

        /* Hace que el cartel aparezca suavemente */
        @keyframes showSign {
            0% { opacity: 0; transform: translateY(20px) scale(0.9); }
            100% { opacity: 1; transform: translateY(0) scale(1); }
        }
    </style>
</head>
<body>
    <div class="scene">
        <div class="face-container">
            <div class="face">😊</div>
            <div class="rose">🌹</div>
        </div>
        <div class="sign">Que Tengas Una<br>Bonita noche Karol</div>
    </div>
</body>
</html>
